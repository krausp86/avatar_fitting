# docker-compose.gpu.yml
# Redundant on this machine – GPU is now the default via docker-compose.override.yml.
# Kept for compatibility; identical to the override.

services:
  web:
    build:
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  pose-worker:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
