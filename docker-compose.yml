services:

  # ── Redis (WebSocket channel layer) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Pose estimation worker (all ML backends) ────────────────────────────────
  pose-worker:
    build:
      context: ./pose_worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MEDIAPIPE_DISABLE_GPU=1
      - HOME=/tmp
      - PYOPENGL_PLATFORM=egl
      - DISPLAY=
      - MIM_HOME=/data/models
      - TORCH_HOME=/data/models
    volumes:
      - ${MODELS_DIR:-./models}:/data/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Django ASGI app ─────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile          # use Dockerfile.cpu for no-GPU
      target: app                     # build up to final stage
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      pose-worker:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=avatar_system.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-1}
      - REDIS_URL=redis://redis:6379/0
      - AVATAR_DATA_ROOT=/data/avatars
      - VIDEO_SCAN_ROOT=/data/videos
      - MEDIA_ROOT=/data/media
      - SMPLX_MODEL_DIR=/data/models
      - VPOSER_MODEL_DIR=/data/models/V02_05
      - DATABASE_URL=/data/db/db.sqlite3
      - MEDIAPIPE_DISABLE_GPU=1
      - POSE_WORKER_URL=http://pose-worker:8001
      - ROMP_MODEL_PATH=/data/models/ROMP/ROMP_V2.pkl
      - ROMP_SMPL_PATH=/data/models/ROMP/SMPL_NEUTRAL.pth
      - TZ=Europe/Vienna
      - HOME=/tmp
      - PYOPENGL_PLATFORM=egl
      - DISPLAY=
    volumes:
      - db_data:/data/db
      # Persistent data – mount your actual training video folder here
      - avatar_data:/data/avatars
      - media_data:/data/media
      - ${VIDEO_FOLDER:-./video_data}:/data/videos:ro   # read-only video source
      # Model weights (not in git – download separately, see models/smplx/.gitkeep)
      - ${MODELS_DIR:-./models}:/data/models:ro
      # Live code reload in development
      - .:/app:cached
    ports:
      - "${PORT:-8006}:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             (python manage.py createsuperuser --noinput 2>/dev/null || true) &&
             daphne -b 0.0.0.0 -p 8000 --websocket_timeout 3600 avatar_system.asgi:application"
  # ── Celery worker (optional – for async fitting jobs) ──────────────────────
  # Uncomment when you replace threading.Thread in tasks.py with Celery
  # worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: app
  #   restart: unless-stopped
  #   depends_on:
  #     - redis
  #   environment:
  #     - DJANGO_SETTINGS_MODULE=avatar_system.settings
  #     - REDIS_URL=redis://redis:6379/0
  #     - AVATAR_DATA_ROOT=/data/avatars
  #     - VIDEO_SCAN_ROOT=/data/videos
  #   volumes:
  #     - avatar_data:/data/avatars
  #     - ${VIDEO_FOLDER:-./video_data}:/data/videos:ro
  #   command: celery -A avatar_system worker -l info --concurrency 1
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

volumes:
  redis_data:
  db_data:
  avatar_data:
  media_data:
